<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小屋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:monospace}
body{background:#111;color:#fff;padding:20px}
.box{max-width:520px;margin:30px auto;border:3px solid #7cf;padding:20px;border-radius:8px}
.pixel-box{display:flex;gap:40px;justify-content:center;margin:20px 0}
.person{text-align:center}
.msg{margin:15px 0;padding:10px;border:1px #5af dashed;min-height:80px;white-space:pre-line}
.ipt{width:100%;padding:8px;margin:8px 0}
.btn{padding:8px 16px;background:#25c;color:#fff;border:none;border-radius:4px;cursor:pointer}
</style>
</head>
<body>
<div class="box" id="home">
<div class="pixel-box">
<div class="person">
<pre>
 ███
█░░░█
█░░░█
 ███
</pre>
<p>清宝</p>
</div>
<div class="person">
<pre>
 ███
█░░░█
█░░░█
 ███
</pre>
<p>莹宝</p>
</div>
</div>
<div class="msg" id="chatbox"></div>
<input class="ipt" id="chat" placeholder="发消息">
<button class="btn" onclick="sendMsg()">发送</button>
</div>

<script>
function sendMsg(){
    let txt = chat.value.trim()
    if(!txt)return
    chatbox.innerText += txt+'\n'
    chat.value=''
}
//回车发送
document.getElementById('chat').onkeydown=e=>{if(e.key=='Enter')sendMsg()}
</script>
</body>
</html>
